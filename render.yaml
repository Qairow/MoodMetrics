services:
  - type: web
    name: moodmetrics-server
    runtime: node
    buildCommand: "cd server && npm install && npx prisma migrate deploy && npm run build"
    startCommand: "cd server && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodmetrics-db
          property: connectionString
      - key: NODE_ENV
        value: production
